# =============================================================================
# TaskSync Pro — Docker Compose (Staging)
# Services: nginx, php-fpm, postgres, redis, minio, reverb, horizon
# =============================================================================

version: "3.9"

x-php-env: &php-env
  APP_NAME: TaskSyncPro
  APP_ENV: staging
  APP_DEBUG: "true"
  APP_KEY: ${APP_KEY}
  APP_URL: https://staging.tasksyncpro.com
  DB_CONNECTION: pgsql
  DB_HOST: postgres
  DB_PORT: 5432
  DB_DATABASE: tasksync
  DB_USERNAME: tasksync
  DB_PASSWORD: ${POSTGRES_PASSWORD}
  REDIS_HOST: redis
  REDIS_PASSWORD: "null"
  REDIS_PORT: 6379
  REVERB_APP_ID: ${REVERB_APP_ID}
  REVERB_APP_KEY: ${REVERB_APP_KEY}
  REVERB_APP_SECRET: ${REVERB_APP_SECRET}
  REVERB_HOST: 0.0.0.0
  REVERB_PORT: 6001
  REVERB_SCHEME: http
  FILESYSTEM_DISK: s3
  AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
  AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
  AWS_DEFAULT_REGION: us-east-1
  AWS_BUCKET: tasksync-staging
  AWS_ENDPOINT: http://minio:9000
  AWS_USE_PATH_STYLE_ENDPOINT: "true"
  MAIL_MAILER: smtp
  MAIL_HOST: ${MAIL_HOST}
  MAIL_PORT: 587
  MAIL_USERNAME: ${MAIL_USERNAME}
  MAIL_PASSWORD: ${MAIL_PASSWORD}
  MAIL_ENCRYPTION: tls
  MAIL_FROM_ADDRESS: noreply@tasksyncpro.com
  MAIL_FROM_NAME: "${APP_NAME}"
  SESSION_DRIVER: redis
  QUEUE_CONNECTION: redis
  CACHE_STORE: redis
  FCM_SERVER_KEY: ${FCM_SERVER_KEY}
  WHATSAPP_TOKEN: ${WHATSAPP_TOKEN}
  SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}

services:
  # ── Database ──────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: tasksync-postgres
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: tasksync
      POSTGRES_USER: tasksync
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tasksync"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Cache / Queue / PubSub ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: tasksync-redis
    restart: unless-stopped
    volumes:
      - redis:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── S3-compatible storage ──────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: tasksync-minio
    restart: unless-stopped
    volumes:
      - minio:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── PHP-FPM (Laravel) ──────────────────────────────────────────────
  php-fpm:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tasksync-php-fpm
    restart: unless-stopped
    environment: *php-env
    volumes:
      - ./backend:/var/www
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "9000:9000"

  # ── WebSocket (Laravel Reverb) ─────────────────────────────────────
  reverb:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tasksync-reverb
    restart: unless-stopped
    environment: *php-env
    volumes:
      - ./backend:/var/www
    command: >
      sh -c "php artisan reverb:start --host=0.0.0.0 --port=6001"
    depends_on:
      - php-fpm
      - redis
    ports:
      - "6001:6001"

  # ── Queue Worker (Laravel Horizon) ──────────────────────────────────
  horizon:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tasksync-horizon
    restart: unless-stopped
    environment: *php-env
    volumes:
      - ./backend:/var/www
    command: >
      sh -c "php artisan horizon"
    depends_on:
      - php-fpm
      - redis

  # ── Reverse Proxy ──────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: tasksync-nginx
    restart: unless-stopped
    volumes:
      - ./frontend/dist:/var/www/html:ro
      - ./backend/docker/nginx-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - php-fpm
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/nginx-health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
  redis:
  minio:
