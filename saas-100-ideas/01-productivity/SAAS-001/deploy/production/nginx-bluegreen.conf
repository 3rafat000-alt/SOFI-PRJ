# TaskSync Pro — Nginx Blue/Green proxy config (production)
# Serves: Vue SPA static files + proxies API/Reverb to Blue or Green
# The ACTIVE_UPSTREAM env var controls which backend receives traffic.
# Values: "blue" (default) or "green"
# Usage: docker compose exec nginx env ACTIVE_UPSTREAM=blue nginx -s reload

upstream php-fpm-blue {
    server php-fpm-blue:9000;
}

upstream php-fpm-green {
    server php-fpm-green:9000;
}

upstream reverb {
    server reverb:6001;
}

map $ENV{ACTIVE_UPSTREAM} $backend {
    default     php-fpm-blue;
    blue        php-fpm-blue;
    green       php-fpm-green;
}

server {
    listen 80;
    listen [::]:80;
    server_name tasksyncpro.com www.tasksyncpro.com;
    root /var/www/html;
    index index.html;

    # Redirect HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }

    location /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name tasksyncpro.com www.tasksyncpro.com;
    root /var/www/html;
    index index.html;

    # SSL (terminated at LB or via mounted certs)
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' wss://tasksyncpro.com; frame-ancestors 'none';" always;

    # Brotli
    brotli on;
    brotli_comp_level 6;
    brotli_static on;
    brotli_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Gzip fallback
    gzip on;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # SPA catch-all
    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Vite content-hashed assets (immutable cache)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API proxy (routes to active backend: blue or green)
    location /api/ {
        proxy_pass http://$backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # WebSocket (Reverb)
    location /broadcasting/ {
        proxy_pass http://reverb;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # Storage proxy
    location /storage/ {
        proxy_pass http://$backend;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # Health check (no auth)
    location /api/v1/health {
        proxy_pass http://$backend;
        proxy_set_header Host $host;
        access_log off;
    }

    location /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Deny hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
