# ModSecurity with OWASP CRS
SecRuleEngine On
SecRequestBodyAccess On
SecResponseBodyAccess Off
SecResponseBodyMimeType text/plain text/html text/xml application/json

# Request limits
SecRequestBodyLimit 20971520
SecRequestBodyNoFilesLimit 131072
SecRequestBodyLimitAction Reject

# Path traversal protection
SecRule REQUEST_URI|ARGS "(\.\.|%2e%2e|%252e%252e|\.\.\/|\.\.\\)" \
    "id:1000,phase:2,deny,status:403,msg:'Path Traversal Attempt'"

# Block common attack tools
SecRule REQUEST_HEADERS:User-Agent "(sqlmap|nmap|nikto|acunetix|burpsuite|nessus|openvas|wikto)" \
    "id:1001,phase:1,deny,status:403,msg:'Attack Tool Detected'"

# SQL injection protection
SecRule ARGS "@detectSQLi" \
    "id:1002,phase:2,deny,status:403,msg:'SQL Injection Attempt'"

# XSS protection
SecRule ARGS "@detectXSS" \
    "id:1003,phase:2,deny,status:403,msg:'XSS Attempt'"

# Block PHP code injection
SecRule ARGS "@detectPHP" \
    "id:1004,phase:2,deny,status:403,msg:'PHP Injection Attempt'"

# Rate limiting for /api/login
# Two-rule approach: phase:2 counter + phase:2 block (phase:5 is logging-only
# and CANNOT deny — all enforcement must happen in phase:1 or phase:2).
#
# Rule 1005: increment counter on every login request (nolog, pass — count only)
SecRule REQUEST_URI "@beginsWith /api/login" \
    "id:1005,phase:2,t:none,nolog,pass,\
     setvar:ip.login_rate=+1,expirevar:ip.login_rate=60"

# Rule 1006: deny if > 5 attempts within the 60-second window
SecRule IP:login_rate "@gt 5" \
    "id:1006,phase:2,t:none,deny,status:429,\
     msg:'Login rate limit exceeded',\
     logdata:'%{ip.login_rate} attempts in 60s'"
