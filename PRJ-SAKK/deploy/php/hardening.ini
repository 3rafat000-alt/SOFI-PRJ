; PHP Hardening for Production
; Removed duplicate 'system' entry; added pcntl_exec, dl, putenv, proc_nice.
; curl_exec / curl_multi_exec intentionally omitted — Guzzle/FCMService/Sentry
; require outbound cURL. Remove that exemption only after verifying in staging.
; mail() omitted — Laravel uses SMTP transport, not PHP mail(); add if confirmed safe.
disable_functions = exec,passthru,shell_exec,system,proc_open,popen,proc_nice,pcntl_exec,dl,putenv,show_source,parse_ini_file
max_execution_time = 30
max_input_time = 30
memory_limit = 256M
post_max_size = 20M
upload_max_filesize = 10M
max_file_uploads = 5
allow_url_fopen = Off
allow_url_include = Off
session.cookie_httponly = 1
session.cookie_secure = 1
session.cookie_samesite = "Lax"
session.use_strict_mode = 1
session.use_only_cookies = 1
session.gc_maxlifetime = 1440
session.sid_length = 128
session.sid_bits_per_character = 6
; Prevents nginx fastcgi_split_path_info PATH_INFO class — must be 0
cgi.fix_pathinfo = 0
expose_php = Off
display_errors = Off
display_startup_errors = Off
log_errors_max_len = 1024
opcache.enable = 1
opcache.memory_consumption = 128
opcache.max_accelerated_files = 10000
opcache.revalidate_freq = 60
