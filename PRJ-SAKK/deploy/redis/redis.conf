# Redis hardening config for SAKK production
# Deploy: place at /etc/redis/redis.conf (or pass as argument to redis-server)
# Requires: redis-server restart after deploy
# IMPORTANT: Replace <REDIS_PASSWORD_PLACEHOLDER> with a 32+ char random secret
#            and set the matching REDIS_PASSWORD= in backend/.env

# ── Network binding — service-level isolation ──────────────────────────────
# Accepts connections only on loopback. Belt-and-suspenders with iptables:
# even if firewall rules are flushed, Redis will not accept remote connections.
bind 127.0.0.1 -::1

# ── Protected mode ────────────────────────────────────────────────────────
# If bind is misconfigured and no password is set, Redis will refuse all
# external connections. Keep this on at all times.
protected-mode yes

# ── Authentication ────────────────────────────────────────────────────────
# Must match REDIS_PASSWORD in backend/.env and config/database.php
# Generate with: openssl rand -base64 48 | tr -d '\n'
requirepass <REDIS_PASSWORD_PLACEHOLDER>

# ── Disable dangerous commands (rename to empty string = disable) ──────────
# These commands can wipe all data or expose configuration secrets.
rename-command FLUSHALL  ""
rename-command FLUSHDB   ""
rename-command CONFIG    ""
rename-command KEYS      ""
rename-command DEBUG     ""
rename-command SHUTDOWN  ""

# ── Persistence ────────────────────────────────────────────────────────────
# Append-only file for durability; disable RDB snapshots in production
# to avoid large fork() pauses (tune as needed for your workload).
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no

# Disable RDB snapshots (comment out or set empty to re-enable)
save ""

# ── Memory limits ─────────────────────────────────────────────────────────
maxmemory 256mb
maxmemory-policy allkeys-lru

# ── Logging ───────────────────────────────────────────────────────────────
loglevel notice
logfile /var/log/redis/redis-server.log

# ── Connection / timeout ──────────────────────────────────────────────────
timeout 300
tcp-keepalive 60
tcp-backlog 511

# ── Daemonize ─────────────────────────────────────────────────────────────
daemonize no    # systemd manages the process; set yes only for init.d setups
