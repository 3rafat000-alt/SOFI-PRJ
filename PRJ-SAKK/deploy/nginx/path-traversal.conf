# Prevent nginx from silently collapsing encoded/duplicate slashes before matching.
# Set at http{} or server{} level — referenced here as a reminder; the directive
# itself must appear in the enclosing context (sakk-site.conf sets it in server{}).
# merge_slashes off;  ← applied in sakk-site.conf server block

# Block path traversal attempts — covers:
#   bare dot-dot sequences  (..)
#   single-encoded dot      (%2e)
#   double-encoded dot      (%252e)
#   single-encoded slash    (%2f)  ← new: catches slash-bypass with merge_slashes off
#   double-encoded slash    (%252f) ← new
location ~* (\.\.|%2e|%252e|%2f|%252f) {
    deny all;
    return 403;
}

# Block common attack patterns
location ~* (eval\(|system\(|exec\(|passthru\(|shell_exec\(|assert\(|phpinfo\(|base64_decode) {
    deny all;
    return 403;
}

# Protect sensitive files
location ~* /(\.git|\.env|\.htaccess|\.svn|composer\.json|package\.json|yarn\.lock) {
    deny all;
    return 404;
}

# Protect storage from direct access
location ~* /storage/(?!app/public/|framework/) {
    internal;
    return 404;
}

# Block .sql, .log, .bak file access
location ~* \.(sql|log|bak|old|swp|save|dump|gz|tar)$ {
    deny all;
    return 404;
}

# Protect artisan and other sensitive files
location ~* /(artisan|server\.php|_ignition|telescope|horizon|debugbar) {
    deny all;
    return 404;
}
