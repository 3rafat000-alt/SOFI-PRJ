# SAKK / Carda-Wallet — nginx site configuration
# Includes all security partials and applies rate limits in location blocks.
# Deploy: copy to /etc/nginx/sites-available/sakk and symlink to sites-enabled/
# The partial snippets (ssl.conf, security-headers.conf, etc.) must be present
# in /etc/nginx/conf.d/ or adjust the include paths below to match your layout.

# ─── Rate-limit zones (http context — must live outside server{}) ────────────
# These zones are defined here so they are loaded as part of this site config
# when included at http-context level. If rate-limiting.conf is already
# included globally, remove these four limit_req_zone lines to avoid duplicate
# zone names.
limit_req_zone  $binary_remote_addr  zone=login:10m    rate=5r/m;
limit_req_zone  $binary_remote_addr  zone=otp:10m      rate=3r/m;
limit_req_zone  $binary_remote_addr  zone=api:20m      rate=60r/m;
limit_req_zone  $binary_remote_addr  zone=transfer:10m rate=10r/m;
limit_conn_zone $binary_remote_addr  zone=addr:10m;

# ─── Redirect plain-HTTP to HTTPS ────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Allow Let's Encrypt ACME challenge; redirect everything else
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── Main TLS server block ───────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name _;

    # Document root — use root (not alias) to avoid alias+location prefix bugs
    root  /var/www/public;
    index index.php;

    # Disable directory listing everywhere
    autoindex off;

    # Prevent nginx from collapsing duplicate / encoded slashes before matching
    merge_slashes off;

    # ── TLS ────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/ssl/certs/sakk.crt;
    ssl_certificate_key /etc/ssl/private/sakk.key;
    ssl_dhparam         /etc/ssl/certs/dhparam.pem;
    include /etc/nginx/conf.d/ssl.conf;

    # ── Security headers (applied to every response in this vhost) ────────
    include /etc/nginx/conf.d/security-headers.conf;

    # ── Compression ───────────────────────────────────────────────────────
    include /etc/nginx/conf.d/compression.conf;

    # ── Path-traversal and sensitive-file blocks ──────────────────────────
    include /etc/nginx/conf.d/path-traversal.conf;

    # ── Global connection cap per IP ──────────────────────────────────────
    limit_conn addr 20;

    # ── Server tokens ─────────────────────────────────────────────────────
    server_tokens off;

    # ── Logs ──────────────────────────────────────────────────────────────
    access_log /var/log/nginx/sakk-access.log combined buffer=16k flush=5s;
    error_log  /var/log/nginx/sakk-error.log  warn;

    # ── Block dotfiles and .git (belt-and-suspenders over path-traversal.conf)
    location ~ /\.(?!well-known) {
        deny all;
        return 404;
    }

    # ── Block .git directory explicitly ───────────────────────────────────
    location ~ /\.git {
        deny all;
        return 404;
    }

    # ── Serve storage privately (X-Accel-Redirect from PHP) ──────────────
    # Files under /var/www/storage/app/private/ are served only via
    # admin.secure-file route (SecureFileController adds X-Accel-Redirect).
    # Direct HTTP access is denied.
    location ^~ /private-storage/ {
        internal;
        alias /var/www/storage/app/private/;
    }

    # ── Block direct access to storage (non-public paths) ─────────────────
    location ^~ /storage/ {
        deny all;
        return 404;
    }

    # ── Public storage symlink (Laravel default: storage/app/public) ──────
    location ^~ /storage/app/public/ {
        # Served via the storage symlink in public/storage; let try_files handle it
        try_files $uri =404;
    }

    # ─────────────────────────────────────────────────────────────────────
    # Rate-limited API endpoints
    # ─────────────────────────────────────────────────────────────────────

    # Login: 5 req/min, burst of 5 with no delay tolerance → hard block after burst
    location = /api/login {
        limit_req zone=login burst=5 nodelay;
        limit_req_status 429;

        try_files $uri /index.php?$query_string;

        include fastcgi_params;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param PATH_INFO       $fastcgi_path_info;
        fastcgi_pass  unix:/run/php/php8.4-fpm.sock;
        fastcgi_index index.php;
    }

    # OTP: 3 req/min, burst of 2
    location = /api/otp {
        limit_req zone=otp burst=2 nodelay;
        limit_req_status 429;

        try_files $uri /index.php?$query_string;

        include fastcgi_params;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param PATH_INFO       $fastcgi_path_info;
        fastcgi_pass  unix:/run/php/php8.4-fpm.sock;
        fastcgi_index index.php;
    }

    # OTP verify (alternate path)
    location = /api/auth/verify-otp {
        limit_req zone=otp burst=2 nodelay;
        limit_req_status 429;

        try_files $uri /index.php?$query_string;

        include fastcgi_params;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param PATH_INFO       $fastcgi_path_info;
        fastcgi_pass  unix:/run/php/php8.4-fpm.sock;
        fastcgi_index index.php;
    }

    # Transfer/payment: 10 req/min, burst of 3
    location ~ ^/api/(transfer|payment|send-money) {
        limit_req zone=transfer burst=3 nodelay;
        limit_req_status 429;

        try_files $uri /index.php?$query_string;

        include fastcgi_params;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param PATH_INFO       $fastcgi_path_info;
        fastcgi_pass  unix:/run/php/php8.4-fpm.sock;
        fastcgi_index index.php;
    }

    # General API: 60 req/min, burst of 20
    location ^~ /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;

        try_files $uri /index.php?$query_string;

        include fastcgi_params;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param PATH_INFO       $fastcgi_path_info;
        fastcgi_pass  unix:/run/php/php8.4-fpm.sock;
        fastcgi_index index.php;
    }

    # ─────────────────────────────────────────────────────────────────────
    # Default location — static files first, fall through to Laravel
    # ─────────────────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP-FPM passthrough ────────────────────────────────────────────────
    location ~ \.php$ {
        # Mitigate PATH_INFO split-handling class (cgi.fix_pathinfo=0 in php.ini)
        fastcgi_split_path_info ^(.+\.php)(/.+)$;

        # Only pass files that actually exist — deny phantom-script attacks
        try_files $fastcgi_script_name =404;

        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param PATH_INFO       $fastcgi_path_info;
        fastcgi_pass  unix:/run/php/php8.4-fpm.sock;
        fastcgi_index index.php;

        fastcgi_read_timeout     90;
        fastcgi_buffer_size      16k;
        fastcgi_buffers          4 16k;
    }

    # ── Block direct PHP execution outside public/ (belt-and-suspenders) ─
    location ~* ^/(?!index\.php$).*\.php$ {
        deny all;
        return 404;
    }

    # ── Block common backup / dump / log extensions ───────────────────────
    location ~* \.(sql|log|bak|old|swp|save|dump|gz|tar|zip)$ {
        deny all;
        return 404;
    }

    # ── Client body limits ────────────────────────────────────────────────
    client_max_body_size 21M;   # matches PHP post_max_size=20M + headroom
}
