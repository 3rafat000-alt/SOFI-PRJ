# Compression
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 256;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    application/x-javascript
    text/xml
    text/x-js
    image/svg+xml
    image/webp
    image/avif
    font/woff2;
